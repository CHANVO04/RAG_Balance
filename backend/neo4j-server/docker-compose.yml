services:
  neo4j:
    image: neo4j:5.18-community
    container_name: neo4j_rag
    ports:
      - "7474:7474"   # Browser: http://localhost:7474
      - "7687:7687"   # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/rag_password
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
